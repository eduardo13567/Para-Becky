<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Becky ❤️</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(135deg, #1a1a1a, #4b0f1a);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

.contenedor {
  padding: 30px;
  max-width: 400px;
}

h1 {
  font-size: 32px;
}

p {
  font-size: 20px;
  line-height: 1.5;
}

button {
  margin-top: 25px;
  padding: 15px 30px;
  border: none;
  border-radius: 30px;
  background: #e91e63;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="contenedor">

<h1>Becky ❤️</h1>

<p>
Antes de continuar...<br><br>
quiero que abras cada parte de este pequeño regalo.
</p>

<button onclick="siguiente()">
Abrir ✨
</button>

<div id="mensaje" style="display:none; margin-top:30px;">
<h2>Un pequeño recuerdo ❤️</h2>

<p>
A veces llegan personas a nuestra vida sin esperarlo...
y poco a poco se vuelven alguien muy especial.
</p>

<button onclick="final()">
Continuar 💌
</button>
</div>

</div>


<script>
function siguiente(){
  document.getElementById("mensaje").style.display = "block";
}

function final(){
  alert("Todavía hay mucho más por descubrir ❤️");
}
}
</script>

</body>
</html>
